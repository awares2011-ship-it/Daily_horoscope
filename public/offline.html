<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Daily Horoscope 🔮</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0612;color:#fff;font-family:sans-serif;text-align:center;padding:1rem}
    .emoji{font-size:4rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
    h1{font-size:1.5rem;margin-bottom:.5rem;background:linear-gradient(135deg,#a29bfe,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    p{color:rgba(255,255,255,.5);margin-bottom:1.5rem;font-size:.9rem;line-height:1.6}
    a{padding:.75rem 1.5rem;background:linear-gradient(135deg,#6C5CE7,#fd79a8);color:#fff;text-decoration:none;border-radius:.75rem;font-weight:700}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  </style>
</head>
<body>
  <div class="emoji">🔮</div>
  <h1>You're Offline</h1>
  <p>The stars need an internet connection to reveal your destiny.<br/>Check your connection and try again.</p>
  <a href="/">Try Again</a>
</body>
</html>
